services:

  postgres:
    image: postgres:17
    container_name: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data 
    env_file:
      - .env 
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - pg_network  
    
volumes:
  pg_data:

networks:
  pg_network: